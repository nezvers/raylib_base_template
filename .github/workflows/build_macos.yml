name: Build Project - macOS

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build_macos.yml'
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write       # Required for actions/upload-release-asset to upload release asset
    runs-on: macos-latest

    # WARNING: Project (internal) name could not be the same as repository name
    env:
      PROJECT_NAME: ${{ github.event.repository.name }}
      PROJECT_REPO_NAME: ${{ github.event.repository.name }}
      PROJECT_BUILD_PATH: ${{ github.event.repository.name }}/build
      PROJECT_RELEASE_PATH: ${{ github.event.repository.name }}_dev_macos
      PROJECT_RESOURCES_SRC_PATH: resources
      PROJECT_RESOURCES_DST_PATH: resources

    steps:
    - name: Checkout this repo
      uses: actions/checkout@master
      with:
        path: ${{ env.PROJECT_REPO_NAME }}

    - name: Setup Release Paths
      run: |
        echo "PROJECT_RELEASE_PATH=${{ env.PROJECT_NAME }}_v${{ github.event.release.tag_name }}_macos" >> $GITHUB_ENV
      shell: bash
      if: github.event_name == 'release' && github.event.action == 'published'

    - name: Setup Environment
      run: |
        mkdir ${{ env.PROJECT_RELEASE_PATH }}
        cd ${{ env.PROJECT_RELEASE_PATH }}
        mkdir -p ${{ env.PROJECT_NAME }}.app/Contents/MacOS
        mkdir -p ${{ env.PROJECT_NAME }}.app/Contents/Resources
        cd ..
        ls
      shell: bash

    - name: Build Product
      run: |
        cd ${{ env.PROJECT_REPO_NAME }}
        # Universal binary: build both arches in one pass. CMake + FetchContent
        # build raylib and box2d for both architectures.
        cmake -S . -B "build" "-DPROJECT_NAME=${{ env.PROJECT_NAME }}" "-DCMAKE_BUILD_TYPE=Release" "-DCMAKE_OSX_ARCHITECTURES=x86_64;arm64"
        cmake --build "build"
        lipo "build/${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}" -detailed_info

    - name: Generate Artifacts
      run: |
        ls ${{ env.PROJECT_BUILD_PATH }}/${{ env.PROJECT_NAME }}
        cp ${{ env.PROJECT_BUILD_PATH }}/${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }} ${{ env.PROJECT_RELEASE_PATH }}/${{ env.PROJECT_NAME }}.app/Contents/MacOS
        cp ${{ env.PROJECT_REPO_NAME }}/src/raylib.icns ${{ env.PROJECT_RELEASE_PATH }}/${{ env.PROJECT_NAME }}.app/Contents/Resources
        cp ${{ env.PROJECT_REPO_NAME }}/src/Info.plist ${{ env.PROJECT_RELEASE_PATH }}/${{ env.PROJECT_NAME }}.app/Contents
        cp -r ${{ env.PROJECT_REPO_NAME }}/${{ env.PROJECT_RESOURCES_SRC_PATH }} ${{ env.PROJECT_RELEASE_PATH }}/${{ env.PROJECT_NAME }}.app/Contents/${{ env.PROJECT_RESOURCES_DST_PATH }}
        cp ${{ env.PROJECT_REPO_NAME }}/README.md ${{ env.PROJECT_RELEASE_PATH }}
        cp ${{ env.PROJECT_REPO_NAME }}/LICENSE ${{ env.PROJECT_RELEASE_PATH }}
        ls ${{ env.PROJECT_RELEASE_PATH }}
        7z a ./${{ env.PROJECT_RELEASE_PATH }}.zip ./${{ env.PROJECT_RELEASE_PATH }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.PROJECT_RELEASE_PATH }}.zip
        path: |
            ./${{ env.PROJECT_RELEASE_PATH }}
            !./${{ env.PROJECT_RELEASE_PATH }}.zip

    - name: Upload Artifact to Release
      uses: softprops/action-gh-release@v3
      with:
        files: ${{ env.PROJECT_RELEASE_PATH }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: github.event_name == 'release' && github.event.action == 'published'
